on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    runs-on: ${{ matrix.os }}

    # Platforms to build on/for
    strategy:
      matrix:
        os: [
          windows-latest,
          macos-latest,
          ubuntu-latest,
         ]
        node-version: [24.14.0]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1
      - name: Install Python3
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13.12'
          cache: 'pip'
      - if: github.ref_type == 'tag'
        id: getVersion
        uses: actions/github-script@v7.0.1
        env:
          REF_NAME: ${{ github.ref_name }}
        with:
          script: |
            const isVersion = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/
            const id = process.env.REF_NAME && process.env.REF_NAME.split('v')[1] || process.env.REF_NAME
            core.setOutput("value", id);
            core.setOutput("ok", isVersion.test(id))
      - if: github.ref_type == 'tag' && steps.getVersion.outputs.ok
        name: set app version
        uses: jossef/action-set-json-field@v2.2
        with:
          file: package.json
          field: version
          value: ${{ steps.getVersion.outputs.value }}
      - if: matrix.os != 'macos-latest'
        name: Install dependencies for windows, linux and intel macos runners
        run: |
          pnpm i --frozen-lockfile
      - if: matrix.os == 'macos-latest'
        name: Install dependencies for macos arm64 runner
        run: |
          # rebuild libsql deps for macos arm64
          pnpm install --config.platform=darwin --config.arch=arm64 --config.target_arch=arm64 --frozen-lockfile
          pnpm rebuild --config.platform=darwin --config.arch=arm64 --config.target_arch=arm64

      - if: matrix.os != 'windows-latest'
        name: Install Python dependencies (unix)
        run: |
          python -m venv --copies .venv
          # Copy Python executable for portability (might not work 😅)
          cp $(which python) .venv/bin/python
          source .venv/bin/activate
          .venv/bin/pip install -r requirements.txt
          rm .venv/bin/pip* # remove pip from venv
          rm .venv/lib/python*/site-packages/pip* # remove pip from venv
      - if: matrix.os == 'windows-latest'
        name: Install Python dependencies (win32)
        run: |
          python -m venv --copies .venv
          # Copy Python executable for portability (might not work 😅)
          Copy-Item (Get-Command python).Source .\.venv\Scripts\python.exe
          & .\.venv\Scripts\Activate.ps1
          pip install -r requirements.txt
          Remove-Item .\.venv\Scripts\pip*.exe
      - name: Build Electron release
        run: |
          pnpm run release
        env:
          # MAIN_VITE_ANYSTACK_API_KEY: ${{ secrets.ANYSTACK_API_KEY }}
          # MAIN_VITE_ANYSTACK_PRODUCT_ID: ${{ secrets.ANYSTACK_PRODUCT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTION_RUNNER: ${{ matrix.os }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_GITHUB_REPOSITORY: ${{ github.repository }}
