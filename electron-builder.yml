# yaml-language-server: $schema=https://json.schemastore.org/electron-builder.json

appId: net.venipa.ytdlpgui
productName: ytdlp-gui
extraMetadata:
  name: YTDLP GUI
  description: "YTDLP GUI App"
directories:
  buildResources: build
disableDefaultIgnoredFiles: true
files:
  - "**/*"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
  - "!**/node_modules/*.d.ts"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyo,rbc,swp,csproj,sln,xproj}"
  - "!**/node_modules/**/*.pyc" # dont allow python bytecode outside of src
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"
  - "!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}"
  - "!**/{appveyor.yml,.travis.yml,circle.yml}"
  - "!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}"
  - "!**/.vscode/*"
  - "!**/{dist_electron,.github,screenshots}/*"
  - "!{dist_electron,.github,screenshots}/*"
  - "!.*/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.*rc,*.config.js,*.config.ts,*config.json,.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,tsconfig*.json}"
  - "!test-*.py"
  - "!test*.mjs"
  - "!test*.js"
  - "!{out}/*.{db,meta.bin,db-shm,db-wal}"
  - "!{scripts}/**"
  - "!{lefthook.yml,pnpm-workspace.yaml,git-config.cjs,requirements.txt}"
asar:
  smartUnpack: true
asarUnpack:
  - resources/**
  - out/main/**
  - build/*.ico
  - build/*.png
  - build/*.jpg
win:
  executableName: ytdlp-gui
  artifactName: ytdlp-gui-${version}-setup.${ext}
  compression: maximum
  target:
    - target: nsis
      arch: x64
  icon: build/icon.ico
nsis:
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  installerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  deleteAppDataOnUninstall: true

mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
  hardenedRuntime: true
  gatekeeperAssess: false
  artifactName: ytdlp-gui-${version}-macos-${arch}.${ext}
  target:
    - target: zip
      arch: arm64
    - target: dmg
      arch: arm64
  icon: build/icon.icns
dmg:
  title: "Install or Update ${productName} ${version}"
  backgroundColor: "#101010"
linux:
  target:
    - target: appImage
    - target: deb
  artifactName: ytdlp-gui-${version}-${os}-${arch}.${ext}
  maintainer: ytdlp.venipa.net
  category: Music
  icon: build/icon.icns
# appx:
#   electronUpdaterAware: true
#   addAutoLaunchExtension: true
afterPack: ./scripts/afterPack.js

npmRebuild: false
publish:
  - provider: github
